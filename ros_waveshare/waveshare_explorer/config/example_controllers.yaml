controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_position_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    #joint_trajectory_velocity_controller:
    #  type: joint_trajectory_controller/JointTrajectoryController

    gripper_position_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_trajectory_position_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3 
    command_interfaces:
      - position

    
    state_interfaces:
      - position
      - velocity
    
    state_publish_rate: 200.0  # Reduce from 200.0
    action_monitor_rate: 100.0  # Reduce from 100.0

    allow_partial_joints_goal: true
    open_loop_control: false
    allow_integration_in_goal_trajectories: true
    constraints:
      goal_time: 0.0  # Start immediately
      stopped_velocity_tolerance: 0.01  # Default is 0.01
      

gripper_position_controller:
  ros__parameters:
    joints:
      - gripper_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: true
    open_loop_control: false
    constraints:
      goal_time: 0.5
      stopped_velocity_tolerance: 0.01

