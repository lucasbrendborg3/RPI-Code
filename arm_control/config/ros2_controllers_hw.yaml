controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: forward_command_controller/ForwardCommandController

    gripper_action_controller:
      type: position_controllers/GripperActionController

# Joint state broadcaster - no parameters needed
joint_state_broadcaster:
  ros__parameters:

#ADD BACK JOINTS HERE if it fails to start
    joints:
      - joint1  # ODrive joints (0-2)
      - joint2
      - joint3
      - joint4  # Waveshare joints (3-5)
      - joint5
      - gripper1  # Gripper joint
    
arm_controller:
  ros__parameters:
    joints:
      - joint1  # ODrive joints (0-2)
      - joint2
      - joint3
      - joint4  # Waveshare joints (3-5)
      - joint5

    interface_name: position

# GRIPPER CONTROLLER - matches main PC exactly
gripper_action_controller:
  ros__parameters:
    joint: gripper1
    action_monitor_rate: 20.0  # 20Hz as requested
    goal_tolerance: 0.1
    max_effort: 2.0
    allow_stalling: false
    stall_velocity_threshold: 0.01
    stall_timeout: 5.0