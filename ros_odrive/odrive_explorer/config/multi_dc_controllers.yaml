controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
      
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

# Parameters for controllers
joint_state_broadcaster:
  ros__parameters: {}

joint_trajectory_controller:
  ros__parameters:
    joints:
      - joint_0
      - joint_1
      - joint_2
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    constraints:
      goal_time: 0.5
      stopped_velocity_tolerance: 0.01

      # Constraints for each joint (OUTCOMMENTED FOR NOW)
      #joint_0:
      #  trajectory: 0.05
      #  goal: 0.03
      #joint_1:
      #  trajectory: 0.05
      #  goal: 0.03
      #joint_2:
      #  trajectory: 0.05
      # goal: 0.03